<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOM CASINO — RIP AND TEAR YOUR MONEY</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0000 url('fon/DOOM.gif') no-repeat center center fixed;
      background-size: cover;
      color: #ff3333;
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
    }

    .overlay {
      background: linear-gradient(rgba(20, 0, 0, 0.0), rgba(60, 0, 0, 0.4));
      min-height: 100vh;
      padding: 0px;
    }

    header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 6px solid #ff0000;
      background: rgba(0,0,0,0.85);
    }

    .logo {
      font-family: 'Creepster', cursive;
      font-size: 4.8rem;
      color: #ff0000;
      letter-spacing: 10px;
      text-shadow: 4px 4px 0 #000, -4px -4px 0 #000, 0 0 30px #ff8800;
    }

    
    .user-info {
      position: absolute;
      top: 25px;
      left: 25px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }

    .username {
      background: #000;
      border: 3px solid #ffff00;
      padding: 8px 18px;
      color: #ffff00;
      font-size: 1.1rem;
      white-space: nowrap;
    }

    .logout-btn {
      background: #440000;
      color: #ffaa00;
      border: 3px solid #ff0000;
      padding: 8px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      width: fit-content;
    }

    .logout-btn:hover {
      background: #660000;
      color: #ffff00;
    }

    .balance {
      position: absolute;
      top: 25px;
      right: 25px;
      background: #000;
      border: 4px solid #ff0000;
      padding: 12px 25px;
      color: #00ff00;
      font-size: 1.2rem;
      box-shadow: 0 0 15px #ff0000;
    }

    .container {
      max-width: 1100px;
      margin: 80px auto 50px;
      text-align: center;
    }

    h1 {
      color: #ffcc00;
      margin-bottom: 40px;
      font-size: 2.4rem;
      text-shadow: 0 0 20px #ff0000;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      padding: 0 20px;
    }

    .game-card {
      background: rgba(30, 0, 0, 0.9);
      border: 6px solid #ff0000;
      padding: 20px;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
    }

    .game-card:hover {
      transform: scale(1.08) rotate(2deg);
      border-color: #ffff00;
      box-shadow: 0 0 40px #ffff00;
    }

    .game-card h3 {
      color: #ffff00;
      margin: 15px 0;
      font-size: 1.5rem;
    }

    .btn {
      display: block;
      margin: 20px auto 10px;
      padding: 16px 40px;
      background: #ff0000;
      color: #fff;
      border: 4px solid #ffff00;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.2rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #ffff00;
      color: #000;
    }

    .hell-text {
      color: #ff8800;
      margin-top: 50px;
      font-size: 1.1rem;
      text-shadow: 0 0 10px #ff0000;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <header>
      <div class="logo">DOOM</div>
      <div class="logo" style="font-size:3.6rem; margin-top:-25px;">CASINO</div>
    </header>

   
    <div class="user-info">
      <div class="username" id="usernameDisplay">ГРЕШНИК: —</div>
      <button class="logout-btn" onclick="logoutUser()">ВЫЙТИ ИЗ АККАУНТА</button>
    </div>

    
    <div class="balance">
      БАЛАНС: <span id="balance">666</span> ₽
    </div>

    <div class="container">
      <h1>ВЫБЕРИ АРЕНУ</h1>

      <div class="games">
        <div class="game-card" onmouseenter="playHoverSound()">
          <h3>КРУТИТЬ СЛОТЫ АДА</h3>
          <p style="color:#ff8888;">Кровавые барабаны</p>
          <a href="slots.html" class="btn">В БОЙ →</a>
        </div>

        <div class="game-card" onmouseenter="playHoverSound()">
          <h3>РУЛЕТКА ДЕМОНА</h3>
          <p style="color:#ff8888;">Кровь или смерть</p>
          <a href="roulette.html" class="btn">В БОЙ →</a>
        </div>

        <div class="game-card" onmouseenter="playHoverSound()">
          <h3>БЛЭКДЖЕК ИЗ АДА</h3>
          <p style="color:#ff8888;">21 — или в пекло</p>
          <a href="blackjack.html" class="btn">В БОЙ →</a>
        </div>

       
      </div>
        <div class="hell-text">
        
      </div>
 <div class="game-card" onmouseenter="playHoverSound()">
          <h3>ПОПОЛНИТЬ БАЛАНС</h3>
          <p style="color:#ff8888;">Влить кровь в счёт</p>
          <a href="deposit.html" class="btn">ПОПОЛНИТЬ →</a>
        </div>
      <div class="hell-text">
        "Они не остановятся, пока не заберут всё..."
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/balance.js"></script>

  <script>
    function playHoverSound() {
      const audio = new Audio('sound/dspistol.mp3');
      audio.volume = 0.3;
      audio.play().catch(() => {});
    }

 
    
    function updateUserInfo() {
      const username = getCurrentUser();
      const usernameDisplay = document.getElementById('usernameDisplay');
      
      if (username) {
        usernameDisplay.textContent = `ГРЕШНИК: ${username.toUpperCase()}`;
      } else {
        usernameDisplay.textContent = `ГРЕШНИК: —`;
      }
    }

    
    function logoutUser() {
      if (confirm("Выйти из аккаунта?")) {
        logout();
        window.location.href = "login.html";
      }
    }

    
    function checkAuth() {
      const currentUser = getCurrentUser();
      
      if (!currentUser) {
        window.location.href = "login.html";
        return false;
      }
      
      return true;
    }

   
    document.addEventListener('DOMContentLoaded', () => {
      
      if (!checkAuth()) return;
      
      
      updateUserInfo();
      
     
      if (typeof updateAllBalances === 'function') {
        updateAllBalances();
      }
      
      
      setInterval(() => {
        if (typeof updateAllBalances === 'function') {
          updateAllBalances();
        }
      }, 5000);
    });
  </script>
</body>
</html>
