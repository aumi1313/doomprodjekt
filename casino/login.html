<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ВХОД В АД — DOOM CASINO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body {
      background: #0a0000;
      color: #ff3333;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      padding: 50px 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(30,0,0,0.9);
      border: 8px solid #ff0000;
      padding: 40px;
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: #000;
      border: 3px solid #ff8800;
      color: white;
      font-family: 'Press Start 2P', cursive;
    }
    button {
      padding: 15px 40px;
      margin: 10px;
      background: #ff0000;
      color: #ffff00;
      border: 5px solid #ffff00;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .message { margin: 15px 0; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>DOOM CASINO</h1>
    <h2>ВХОД В АД</h2>

    <input type="text" id="username" placeholder="ИМЯ ГРЕШНИКА" maxlength="20">
    <input type="password" id="password" placeholder="ПАРОЛЬ">

    <div>
      <button onclick="registerUser()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
      <button onclick="loginUser()">ВОЙТИ</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    function showMessage(text, color = '#ff3333') {
      document.getElementById('message').style.color = color;
      document.getElementById('message').textContent = text;
    }

    function registerUser() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMessage("ВВЕДИ ИМЯ И ПАРОЛЬ!");
        return;
      }

      const result = register(username, password);
      showMessage(result.message, result.success ? '#00ff00' : '#ff3333');

      if (result.success) {
        setTimeout(() => window.location.href = "index.html", 1500);
      }
    }

    function loginUser() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMessage("ВВЕДИ ИМЯ И ПАРОЛЬ!");
        return;
      }

      const result = login(username, password);
      showMessage(result.message, result.success ? '#00ff00' : '#ff3333');

      if (result.success) {
        setTimeout(() => window.location.href = "index.html", 1200);
      }
    }
  </script>
</body>
</html>
