<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DOOM ADMIN — ПАНЕЛЬ УПРАВЛЕНИЯ АДОМ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0000 url('fon/DOOM.gif') no-repeat center center fixed;
      background-size: cover;
      color: #ff3333;
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
    }

    .admin-overlay {
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
      padding: 20px;
    }

    /* Хедер */
    .admin-header {
      text-align: center;
      padding: 20px 0;
      border-bottom: 6px solid #ff0000;
      background: rgba(0, 0, 0, 0.9);
      margin-bottom: 30px;
      position: relative;
    }

    .logo {
      font-family: 'Creepster', cursive;
      font-size: 3rem;
      color: #ff0000;
      letter-spacing: 6px;
      text-shadow: 4px 4px 0 #000, 0 0 20px #ff8800;
    }

    .admin-badge {
      background: #ff0000;
      color: #000;
      font-size: 0.8rem;
      padding: 8px 16px;
      display: inline-block;
      margin-top: 10px;
      border: 2px solid #ffff00;
      font-family: 'Press Start 2P', cursive;
    }

    
    .back-button {
      position: absolute;
      left: 20px;
      top: 20px;
      background: #440000;
      color: #ffaa00;
      border: 3px solid #ff0000;
      padding: 8px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'Press Start 2P', cursive;
      text-decoration: none;
      display: inline-block;
    }

    .back-button:hover {
      background: #660000;
      color: #ffff00;
    }

    
    .stats-panel {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(30, 0, 0, 0.95);
      border: 3px solid #ff0000;
      padding: 15px 25px;
      flex: 1;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
    }

    .stat-card h4 {
      color: #ffff00;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 1.8rem;
      color: #00ff00;
      text-shadow: 0 0 5px #00aa00;
    }

    
    .users-table-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.8);
      border: 6px solid #ff0000;
      overflow-x: auto;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      min-width: 700px;
    }

    .users-table th {
      background: #2a0000;
      color: #ffff00;
      padding: 16px 12px;
      font-size: 0.85rem;
      border-bottom: 3px solid #ff0000;
      text-align: left;
    }

    .users-table td {
      padding: 14px 12px;
      border-bottom: 1px solid #660000;
      color: #ffaaaa;
    }

    .users-table tr:hover {
      background: rgba(255, 0, 0, 0.2);
      transition: 0.2s;
    }

    .balance-cell {
      font-weight: bold;
      color: #00ff66;
      font-size: 0.9rem;
    }

    .edit-input {
      background: #1a1a1a;
      border: 2px solid #ff0000;
      color: #ffff00;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.7rem;
      padding: 6px 8px;
      width: 120px;
      text-align: center;
    }

    .edit-input:focus {
      outline: none;
      border-color: #ffff00;
    }

    .btn-admin {
      background: #550000;
      border: 2px solid #ff8800;
      color: #ffcc00;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.65rem;
      padding: 6px 12px;
      cursor: pointer;
      margin: 0 4px;
      transition: all 0.2s;
    }

    .btn-admin:hover {
      background: #aa0000;
      border-color: #ffff00;
      color: #ffffff;
      transform: scale(1.02);
    }

    .btn-save {
      background: #006600;
      border-color: #00ff00;
      color: #aaffaa;
    }

    .btn-save:hover {
      background: #00aa00;
      color: #000;
    }

    .btn-reset {
      background: #222;
      border-color: #ff6600;
    }

    .delete-user-btn {
      background: #8b0000;
      border-color: #ff0000;
      color: #ffaaaa;
    }

    .delete-user-btn:hover {
      background: #cc0000;
      color: white;
    }

    .action-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .add-user-area {
      max-width: 1300px;
      margin: 30px auto 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 3px solid #ff4400;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: flex-end;
      justify-content: center;
    }

    .add-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .add-field label {
      font-size: 0.7rem;
      color: #ffaa66;
    }

    .add-field input {
      background: #2a0000;
      border: 2px solid #ff0000;
      padding: 8px 12px;
      color: #ffff00;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.7rem;
    }

    .add-field input:focus {
      border-color: #ffff00;
      outline: none;
    }

    .btn-add {
      background: #aa3300;
      border: 3px solid #ffaa00;
      padding: 10px 24px;
      font-size: 0.8rem;
    }

    .btn-add:hover {
      background: #ff5500;
    }

    .message-area {
      text-align: center;
      margin-top: 20px;
      padding: 12px;
      background: #111;
      border-left: 8px solid #ff0000;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      font-size: 0.7rem;
      color: #ffaa77;
    }

    .footer-hell {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      font-size: 0.6rem;
      color: #aa4444;
    }

    @media (max-width: 800px) {
      .logo { font-size: 2rem; }
      .stat-value { font-size: 1.2rem; }
      .users-table th, .users-table td { font-size: 0.6rem; padding: 10px 6px; }
      .edit-input { width: 80px; font-size: 0.55rem; }
      .btn-admin { font-size: 0.5rem; padding: 4px 8px; }
    }
  </style>
</head>
<body>
<div class="admin-overlay">
  <div class="admin-header">
    <a href="index.html" class="back-button">← ВЕРНУТЬСЯ В АД</a>
    <div class="logo">DOOM ADMIN</div>
    <div class="admin-badge">ПОВЕЛИТЕЛЬ ДАННЫХ</div>
  </div>

  <div class="stats-panel" id="statsPanel">
    <div class="stat-card">
      <h4>👥 ВСЕГО ГРЕШНИКОВ</h4>
      <div class="stat-value" id="totalUsers">0</div>
    </div>
    <div class="stat-card">
      <h4>ОБЩАЯ СУММА БАЛАНСОВ</h4>
      <div class="stat-value" id="totalBalance">0</div>
    </div>
    <div class="stat-card">
      <h4>СРЕДНИЙ БАЛАНС</h4>
      <div class="stat-value" id="avgBalance">0</div>
    </div>
  </div>

  <div class="users-table-wrapper">
    <table class="users-table" id="usersTable">
      <thead>
        <tr>
          <th>ГРЕШНИК</th>
          <th>БАЛАНС (₽)</th>
          <th>ДАТА РЕГИСТРАЦИИ</th>
          <th>ДЕЙСТВИЯ АДМИНА</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="4" style="text-align:center;">ЗАГРУЗКА ДАННЫХ ИЗ ПРЕИСПОДНЕЙ...</td></tr>
      </tbody>
    </table>
  </div>

  
  <div class="add-user-area">
    <div class="add-field">
      <label>👤 ИМЯ ГРЕШНИКА</label>
      <input type="text" id="newUserName" placeholder="Например: RAZOR" autocomplete="off">
    </div>
    <div class="add-field">
      <label>🔑 ПАРОЛЬ</label>
      <input type="text" id="newUserPass" placeholder="Пароль" value="doom123">
    </div>
    <div class="add-field">
      <label>НАЧАЛЬНЫЙ БАЛАНС</label>
      <input type="number" id="newUserBalance" placeholder="666" value="666">
    </div>
    <button class="btn btn-admin btn-add" id="addUserBtn">➕ ДОБАВИТЬ В АД</button>
  </div>

  <div id="messageBox" class="message-area"></div>
  
</div>

<script>
  
  function getUsers() {
    const users = localStorage.getItem('doomCasinoUsers');
    return users ? JSON.parse(users) : {};
  }

  function saveUsers(users) {
    localStorage.setItem('doomCasinoUsers', JSON.stringify(users));
    // После изменения пользователей обновляем таблицу и статистику
    renderUsersTable();
    updateStats();
  }

  
  function getUsersList() {
    const usersObj = getUsers();
    return Object.entries(usersObj).map(([username, data]) => ({
      username: username,
      password: data.password,
      balance: typeof data.balance === 'number' ? data.balance : 666,
      createdAt: data.createdAt || new Date().toISOString()
    }));
  }

  
  function setUserBalance(username, newBalance) {
    const users = getUsers();
    if (!users[username]) return false;
    const balanceNum = Number(newBalance);
    if (isNaN(balanceNum)) return false;
    users[username].balance = Math.floor(balanceNum);
    saveUsers(users);
    
   
    const currentSessionUser = localStorage.getItem('currentDoomUser');
    if (currentSessionUser === username) {
      // также обновляем баланс в сессионном ключе, чтобы на активных вкладках отображалось корректно
      localStorage.setItem('doomCasinoBalance', Math.floor(balanceNum));
    }
    return true;
  }

  
  function deleteUser(username) {
    const users = getUsers();
    if (!users[username]) return false;
    // Нельзя удалить самого себя если админ залогинен под этим же? но админ может создавать любых, пусть может удалить даже себя(но осторожно)
    // Проверка: если удаляем текущего залогиненного, то нужно разлогинить его в сессии, чтобы потом не было ошибок.
    const currentSessionUser = localStorage.getItem('currentDoomUser');
    if (currentSessionUser === username) {
      // Удаляем сессию пользователя, чтобы не было битых ссылок
      localStorage.removeItem('currentDoomUser');
      localStorage.removeItem('doomCasinoBalance');
    }
    delete users[username];
    saveUsers(users);
    return true;
  }

  
  function addUser(username, password, initialBalance) {
    const users = getUsers();
    if (users[username]) {
      showMessage(`❌ Грешник "${username}" уже существует в аду!`, 'error');
      return false;
    }
    if (!username || username.trim().length < 2) {
      showMessage(`❌ Имя слишком короткое (минимум 2 символа)`, 'error');
      return false;
    }
    if (!password || password.length < 1) {
      showMessage(`❌ Укажи пароль для грешника`, 'error');
      return false;
    }
    const balanceNum = Number(initialBalance);
    if (isNaN(balanceNum) || balanceNum < 0) {
      showMessage(`❌ Баланс должен быть числом >= 0`, 'error');
      return false;
    }
    users[username] = {
      password: password,
      balance: Math.floor(balanceNum),
      createdAt: new Date().toISOString()
    };
    saveUsers(users);
    showMessage(`Грешник ${username} добавлен в ад с балансом ${Math.floor(balanceNum)} `, 'success');
    return true;
  }

  // вывести сообщение
  function showMessage(msg, type = 'info') {
    const msgBox = document.getElementById('messageBox');
    if (!msgBox) return;
    msgBox.style.color = type === 'error' ? '#ff7777' : '#aaffaa';
    msgBox.style.borderLeftColor = type === 'error' ? '#ff0000' : '#00ff00';
    msgBox.innerHTML = msg;
    setTimeout(() => {
      if (msgBox.innerHTML === msg) msgBox.innerHTML = 'ГОТОВО';
      setTimeout(() => {
        if (msgBox.innerHTML === 'ГОТОВО') msgBox.innerHTML = '';
      }, 1500);
    }, 2500);
  }


  function renderUsersTable() {
    const tbody = document.getElementById('usersTableBody');
    if (!tbody) return;
    const usersList = getUsersList();
    if (usersList.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">НЕТ ГРЕШНИКОВ, СОЗДАЙТЕ НОВЫХ</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    usersList.forEach(user => {
      const row = tbody.insertRow();
      // Имя пользователя
      const cellName = row.insertCell(0);
      cellName.textContent = user.username;
      cellName.style.fontWeight = 'bold';
      cellName.style.color = '#ffaa66';
      // Баланс (ячейка с возможностью редактирования inline)
      const cellBalance = row.insertCell(1);
      const balanceSpan = document.createElement('span');
      balanceSpan.className = 'balance-cell';
      balanceSpan.id = `balance-${user.username}`;
      balanceSpan.textContent = `${user.balance} ₽`;
      cellBalance.appendChild(balanceSpan);
      
      const cellDate = row.insertCell(2);
      const dateObj = new Date(user.createdAt);
      cellDate.textContent = dateObj.toLocaleDateString('ru-RU') + ' ' + dateObj.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
      cellDate.style.fontSize = '0.65rem';
      cellDate.style.color = '#bb8888';
      
      const cellActions = row.insertCell(3);
      cellActions.className = 'action-buttons';

      
      const editInput = document.createElement('input');
      editInput.type = 'number';
      editInput.className = 'edit-input';
      editInput.placeholder = 'Новый баланс';
      editInput.value = user.balance;
      editInput.style.display = 'none';

      
      const editBtn = document.createElement('button');
      editBtn.textContent = 'ИЗМЕНИТЬ';
      editBtn.className = 'btn-admin';
      editBtn.onclick = () => {
        editInput.style.display = 'inline-block';
        editBtn.style.display = 'none';
        saveBtn.style.display = 'inline-block';
        cancelBtn.style.display = 'inline-block';
        editInput.focus();
      };

    
      const saveBtn = document.createElement('button');
      saveBtn.textContent = '💾 СОХРАНИТЬ';
      saveBtn.className = 'btn-admin btn-save';
      saveBtn.style.display = 'none';
      saveBtn.onclick = () => {
        const newBalanceVal = parseInt(editInput.value, 10);
        if (isNaN(newBalanceVal)) {
          showMessage(`❌ Неверное значение баланса для ${user.username}`, 'error');
          return;
        }
        if (newBalanceVal < 0) {
          showMessage(`❌ Баланс не может быть отрицательным`, 'error');
          return;
        }
        
        setUserBalance(user.username, newBalanceVal);
        // Обновляем отображение баланса в строке
        const updatedUsers = getUsers();
        const newBal = updatedUsers[user.username]?.balance || 0;
        balanceSpan.textContent = `${newBal} ₽`;
        editInput.value = newBal;
        // Возвращаем интерфейс в обычный режим
        editInput.style.display = 'none';
        editBtn.style.display = 'inline-block';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
        showMessage(`✅ Баланс ${user.username} изменён на ${newBal} ₽`, 'success');
        updateStats();
      };

      
      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = '❌ ОТМЕНА';
      cancelBtn.className = 'btn-admin';
      cancelBtn.style.display = 'none';
      cancelBtn.onclick = () => {
        editInput.value = user.balance;
        editInput.style.display = 'none';
        editBtn.style.display = 'inline-block';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
      };

      
      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'УДАЛИТЬ';
      deleteBtn.className = 'btn-admin delete-user-btn';
      deleteBtn.onclick = () => {
        if (confirm(`Ты уверен, что хочешь отправить ${user.username} в бездну навсегда?`)) {
          deleteUser(user.username);
          showMessage(`💀 ${user.username} удалён из ада 💀`, 'info');
          updateStats();
          renderUsersTable(); // полный перерендер
        }
      };

      cellActions.appendChild(editInput);
      cellActions.appendChild(editBtn);
      cellActions.appendChild(saveBtn);
      cellActions.appendChild(cancelBtn);
      cellActions.appendChild(deleteBtn);
    });
  }

  
  function updateStats() {
    const usersList = getUsersList();
    const total = usersList.length;
    let totalBalanceSum = 0;
    usersList.forEach(u => totalBalanceSum += u.balance);
    const avg = total === 0 ? 0 : Math.floor(totalBalanceSum / total);
    document.getElementById('totalUsers').textContent = total;
    document.getElementById('totalBalance').textContent = totalBalanceSum.toLocaleString() + ' ₽';
    document.getElementById('avgBalance').textContent = avg.toLocaleString() + ' ₽';
  }

  
  function handleAddUser() {
    const username = document.getElementById('newUserName').value.trim();
    const password = document.getElementById('newUserPass').value.trim();
    let balanceVal = document.getElementById('newUserBalance').value;
    if (!username) {
      showMessage('Введи имя грешника!', 'error');
      return;
    }
    if (!password) {
      showMessage('Пароль не может быть пустым', 'error');
      return;
    }
    let initBalance = parseInt(balanceVal, 10);
    if (isNaN(initBalance)) initBalance = 666;
    if (initBalance < 0) initBalance = 0;
    const success = addUser(username, password, initBalance);
    if (success) {
      document.getElementById('newUserName').value = '';
      document.getElementById('newUserPass').value = 'doom123';
      document.getElementById('newUserBalance').value = '666';
      renderUsersTable();
      updateStats();
    }
  }

 
  function adminAccessGuard() {
  
    let isAdmin = sessionStorage.getItem('doomAdminAuthenticated');
    if (isAdmin === 'true') return true;
    // Если нет, запросим пароль администратора (простой код)
    const password = prompt("⚡ ДОСТУП ТОЛЬКО ДЛЯ ПОВЕЛИТЕЛЯ АДА ⚡\nВведите пароль администратора:");
    if (password === "DOOM666" || password === "admin666"| password === "катя") {
      sessionStorage.setItem('doomAdminAuthenticated', 'true');
      return true;
    } else if (password === null) {
      alert("Доступ запрещён! Перенаправление в казино...");
      window.location.href = "index.html";
      return false;
    } else {
      alert("Неверный пароль! Ты не пройдёшь, смертный.");
      window.location.href = "index.html";
      return false;
    }
  }

 
  function initAdminPanel() {
    if (!adminAccessGuard()) return;
    
    let users = getUsers();
    if (Object.keys(users).length === 0) {
      
      users["DOOM_SLAYER"] = {
        password: "ripandtear",
        balance: 9999,
        createdAt: new Date().toISOString()
      };
      users["HELL_KNIGHT"] = {
        password: "hellfire",
        balance: 4200,
        createdAt: new Date().toISOString()
      };
      users["CYBERDEMON"] = {
        password: "666",
        balance: 1337,
        createdAt: new Date().toISOString()
      };
      saveUsers(users);
    }
    renderUsersTable();
    updateStats();

   
    document.getElementById('addUserBtn').addEventListener('click', handleAddUser);
    
    const inputs = ['newUserName', 'newUserPass', 'newUserBalance'];
    inputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleAddUser(); });
    });
  }

  // Запуск
  window.addEventListener('DOMContentLoaded', initAdminPanel);
</script>
</body>
</html>
