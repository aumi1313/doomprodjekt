<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПОПОЛНЕНИЕ — DOOM CASINO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0000 url('https://images.unsplash.com/photo-1617791160505-6f00504e3519?w=1920') no-repeat center center fixed;
      background-size: cover;
      color: #ff3333;
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
    }

    .overlay {
      background: linear-gradient(rgba(15, 0, 0, 0.95), rgba(60, 0, 0, 0.97));
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 25px 0;
      border-bottom: 6px solid #ff0000;
      background: rgba(0,0,0,0.9);
    }

    .title {
      font-size: 2.8rem;
      color: #ff0000;
      text-shadow: 0 0 25px #ff0000;
      letter-spacing: 4px;
    }

    .balance {
      position: absolute;
      top: 25px;
      right: 25px;
      background: #000;
      border: 4px solid #ff0000;
      padding: 12px 25px;
      color: #00ff00;
      font-size: 1.2rem;
    }

    .container {
      max-width: 700px;
      margin: 50px auto;
      background: #1a0000;
      border: 8px solid #ff0000;
      padding: 40px 30px;
      box-shadow: 0 0 40px rgba(255,0,0,0.7);
    }

    h2 {
      color: #ffff00;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #ff0000;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ffaa00;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 15px;
      background: #000;
      border: 3px solid #ff8800;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.1rem;
    }

    input:focus {
      outline: none;
      border-color: #ffff00;
      box-shadow: 0 0 15px #ffff00;
    }

    button {
      width: 100%;
      padding: 18px;
      margin: 15px 0;
      font-size: 1.4rem;
      background: #ff0000;
      color: #ffff00;
      border: 5px solid #ffff00;
      font-family: 'Press Start 2P', cursive;
      cursor: pointer;
    }

    button:hover {
      background: #ffff00;
      color: #ff0000;
    }

    #message {
      margin-top: 20px;
      padding: 15px;
      text-align: center;
      font-size: 1.3rem;
      min-height: 60px;
    }

    .success { color: #00ff00; }
    .error { color: #ff6666; }

    .soul-btn {
      background: #660000;
      border-color: #ff00ff;
      color: #ff00ff;
      margin-top: 30px;
    }

    .soul-btn:hover {
      background: #ff00ff;
      color: #000;
    }

    .back-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 30px;
      background: #330000;
      color: #ffaa00;
      text-decoration: none;
      border: 3px solid #ff0000;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <header>
      <div class="title">ПОПОЛНЕНИЕ СЧЁТА</div>
    </header>

    <div class="balance">
      БАЛАНС: <span id="balance">6660</span> ₽
    </div>

    <div class="container">
      <h2>ВВЕДИ ДАННЫЕ КАРТЫ</h2>

      <div class="input-group">
        <label>НОМЕР КАРТЫ</label>
        <input type="text" id="cardNumber" maxlength="19" placeholder="4242 4242 4242 4242" oninput="formatCardNumber(this)">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="input-group">
          <label>СРОК ДЕЙСТВИЯ (MM/YY)</label>
          <input type="text" id="expiry" maxlength="5" placeholder="12/28">
        </div>
        <div class="input-group">
          <label>CVV</label>
          <input type="text" id="cvv" maxlength="4" placeholder="666">
        </div>
      </div>

      <div class="input-group">
        <label>СУММА ПОПОЛНЕНИЯ (₽)</label>
        <input type="number" id="amount" placeholder="666" value="666">
      </div>

      <button onclick="deposit()">ПОПОЛНИТЬ БАЛАНС</button>

      <div id="message"></div>

      <button onclick="sellSoul()" id="soulButton" class="soul-btn">
        🔥 ПРОДАТЬ ДУШУ ЗА 6666 ₽ 🔥
      </button>

      <center>
        <a href="index.html" class="back-btn">← ВЕРНУТЬСЯ В АД</a>
      </center>
    </div>
  </div>

 <script src="js/auth.js"></script>
<script src="js/balance.js"></script>
<script>
  let soulSold = localStorage.getItem('doomSoulSold') === 'true';
    function deposit() {
        const amount = parseInt(document.getElementById('amount').value);
        if (!amount || amount <= 0) {
            showMessage("ВВЕДИ СУММУ!", "error");
            return;
        }
        if (amount > 6666) {
            showMessage("НЕДОСТАТОЧНО СРЕДСТВ НА КАРТЕ АДА!", "error");
            return;
        }

        addBalance(amount);
        showMessage(`+${amount} ₽ ЗАЧИСЛЕНО!`, "success");
    }

    function sellSoul() {
        if (soulSold) return;
        
        if (confirm("ПРОДАТЬ ДУШУ ЗА 6666 ₽?\n\nЭто можно сделать только один раз!")) {
            addBalance(6666);
            soulSold = true;
            soulButton.disabled = true;
            soulButton.textContent = "✅ ДУША ПРОДАНА";
            showMessage("ДУША ПРОДАНА! +6666 ₽", "success");
        }
    }
</script>
</body>
</html>
